<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Movie Rental System{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            background: #f5f6fa;
            color: #1f2937;
        }
        header {
            background: #1f2937;
            color: #fff;
            padding: 1rem 1.5rem;
        }
        header h1 {
            margin: 0 0 .25rem 0;
            font-size: 1.25rem;
        }
        nav a {
            color: #d1d5db;
            text-decoration: none;
            margin-right: 1rem;
            font-size: .95rem;
        }
        nav a:hover { color: #fff; }
        main {
            max-width: 1100px;
            margin: 1.5rem auto;
            padding: 0 1.5rem 3rem;
        }
        h2 { margin-top: 0; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
        }
        th, td {
            padding: .65rem .85rem;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            font-size: .9rem;
        }
        th {
            background: #f3f4f6;
            font-weight: 600;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .03em;
            color: #4b5563;
        }
        tr:last-child td { border-bottom: 0; }
        .card {
            background: #fff;
            padding: 1.25rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
            margin-bottom: 1rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat {
            background: #fff;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
        }
        .stat .label { font-size: .8rem; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
        .stat .value { font-size: 1.6rem; font-weight: 600; margin-top: .25rem; }
        form .field { margin-bottom: 1rem; }
        label { display: block; font-size: .85rem; color: #374151; margin-bottom: .25rem; }
        input, select, textarea {
            width: 100%;
            padding: .55rem .65rem;
            font-size: .95rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #1f2937;
        }
        textarea { min-height: 80px; resize: vertical; }
        .btn {
            display: inline-block;
            padding: .55rem 1rem;
            background: #2563eb;
            color: #fff;
            border: 0;
            border-radius: 6px;
            font-size: .9rem;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #6b7280; }
        .btn-secondary:hover { background: #4b5563; }
        .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
        .btn-link { background: none; color: #2563eb; padding: 0; }
        .btn-link:hover { background: none; text-decoration: underline; }
        .actions { display: flex; gap: .5rem; align-items: center; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .badge {
            display: inline-block;
            padding: .15rem .55rem;
            border-radius: 999px;
            font-size: .75rem;
            font-weight: 600;
        }
        .badge-ok { background: #d1fae5; color: #065f46; }
        .badge-warn { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e3a8a; }
        .flash {
            padding: .65rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }
        .flash-success { background: #d1fae5; color: #065f46; }
        .flash-error { background: #fee2e2; color: #991b1b; }
        .inline-form { display: inline; }
        .muted { color: #6b7280; font-size: .85rem; }
    </style>
</head>
<body>
    <header>
        <h1>Movie Rental System</h1>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('customers_list') }}">Customers</a>
            <a href="{{ url_for('movies_list') }}">Movies</a>
            <a href="{{ url_for('rentals_list') }}">Rentals</a>
            <a href="{{ url_for('payments_history') }}">Payments</a>
            <a href="{{ url_for('reports') }}">Reports</a>
        </nav>
    </header>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
