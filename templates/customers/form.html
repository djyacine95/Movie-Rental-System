{% extends "base.html" %}
{% block title %}{{ 'Edit' if customer else 'Add' }} Customer{% endblock %}
{% block content %}
<h2>{{ 'Edit' if customer else 'Add' }} Customer</h2>

<form method="post" class="card">
    <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" required value="{{ customer.Name if customer else '' }}">
    </div>
    <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required value="{{ customer.Email if customer else '' }}">
    </div>
    <div class="field">
        <label for="phone">Phone number</label>
        <input id="phone" name="phone" value="{{ customer.PhoneNumber if customer else '' }}">
    </div>
    <div class="field">
        <label for="address">Address</label>
        <textarea id="address" name="address">{{ customer.Address if customer else '' }}</textarea>
    </div>
    <div class="actions">
        <button type="submit" class="btn">{{ 'Save changes' if customer else 'Add customer' }}</button>
        <a class="btn btn-secondary" href="{{ url_for('customers_list') }}">Cancel</a>
    </div>
</form>
{% endblock %}
